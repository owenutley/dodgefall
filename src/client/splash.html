<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>dodgefall</title>
  </head>
  <body class="app">
    <div class="game-card">
      <div class="title-block">
        <h1 class="game-title">DODGE FALL</h1>
        <p class="game-sub">avoid the falling blocks</p>
      </div>

      <div class="preview">
        <div class="block b1"></div>
        <div class="block b2"></div>
        <div class="block b3"></div>
        <div class="player"></div>
      </div>

      <div class="meta">
        <span class="label">PLAYER</span>
        <span class="value" id="title">—</span>
      </div>

      <button class="start-button" id="start-button">▶ PLAY</button>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
